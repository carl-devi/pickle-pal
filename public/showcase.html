<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venue Showcase | Pickle Pal</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="brand-logo">
          <img
            src="assets/PAYAG(1).png"
            alt="Pickle Pal Logo"
            class="brand-img"
          />
          <span class="brand-text">PICKLE PAL</span>
        </div>
        <div class="nav-links">
          <a href="main.html">Home / Book</a>
          <a
            href="showcase.html"
            style="font-weight: 700; text-decoration: underline"
            >Venue Showcase</a
          >
        </div>
      </div>
    </nav>

    <main class="container">
      <section class="venue-showcase" style="margin-top: 2rem">
        <div class="showcase-header">
          <h2>Full Venue Showcase</h2>
          <p>
            Explore Court Yard Central. High-quality courts, premium lighting,
            and relaxing amenities.
          </p>
        </div>

        <div class="gallery-grid">
          <div class="gallery-item">
            <img src="assets/PAYAG - 15.jpg" />
          </div>
          <div class="gallery-item">
            <img src="assets/PAYAG - 13.jpg" />
          </div>
          <div class="gallery-item">
            <img src="assets/PAYAG - 12.jpg" />
          </div>
          <div class="gallery-item">
            <img src="assets/updated-showcase.jpg" />
          </div>
          <div class="gallery-item">
            <img src="assets/PAYAG - 17.jpg" />
          </div>
          <div class="gallery-item">
            <img src="assets/PAYAG - 20.jpg" />
          </div>
        </div>

        <div style="text-align: center; margin-top: 3rem">
          <a
            href="main.html"
            class="btn-primary-action"
            style="text-decoration: none; display: inline-block"
            >Ready to Play? Book Now</a
          >
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <img
            src="assets/PAYAG(1).png"
            alt="Pickle Pal Logo"
            class="brand-img footer-logo"
          />
          <h4>PICKLE PAL</h4>
        </div>
        <div class="footer-links">
          <h5>QUICK LINKS</h5>
          <a href="main.html">Book Court</a>
          <a href="#">View Showcase</a>
          <a href="main.html">About Us</a>
        </div>
      </div>
    </footer>
  </body>
</html>
